<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="google-site-verification" content="cfRCbQjG8jkOrg97UuVnMX8MLaXuRkfYIn5Kma5hthg" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DWST_API 620 – Seismic Analysis Calculator [Protected]</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #080c14;
    background-image:
      radial-gradient(ellipse 70% 50% at 50% 0%, rgba(59,130,246,0.12) 0%, transparent 60%),
      radial-gradient(ellipse 40% 30% at 80% 80%, rgba(6,214,160,0.06) 0%, transparent 50%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    overflow: hidden;
  }

  /* ── Animated background grid ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
    pointer-events: none;
  }

  /* ── Lock screen card ── */
  .lock-card {
    position: relative;
    background: linear-gradient(160deg, #0d1320 0%, #111827 100%);
    border: 1px solid rgba(59,130,246,0.2);
    border-radius: 20px;
    padding: 52px 48px 44px;
    width: 420px;
    max-width: 95vw;
    box-shadow:
      0 0 0 1px rgba(255,255,255,0.04),
      0 8px 32px rgba(0,0,0,0.6),
      0 0 80px rgba(59,130,246,0.08);
    animation: cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
  }
  @keyframes cardIn {
    from { opacity:0; transform: translateY(24px) scale(0.96); }
    to   { opacity:1; transform: translateY(0)    scale(1); }
  }
  /* top accent line */
  .lock-card::before {
    content: '';
    position: absolute;
    top: 0; left: 10%; right: 10%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(59,130,246,0.6) 50%, transparent);
    border-radius: 1px;
  }

  /* ── Shield icon ── */
  .shield-wrap {
    display: flex;
    justify-content: center;
    margin-bottom: 28px;
  }
  .shield {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, #1e3a5f 0%, #1a2e4a 100%);
    border: 1px solid rgba(59,130,246,0.35);
    border-radius: 18px;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px;
    box-shadow: 0 0 32px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.08);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 28px rgba(59,130,246,0.2), inset 0 1px 0 rgba(255,255,255,0.08); }
    50%      { box-shadow: 0 0 44px rgba(59,130,246,0.35), inset 0 1px 0 rgba(255,255,255,0.1); }
  }

  /* ── Typography ── */
  .lock-title {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #e2e8f0;
    letter-spacing: 0.01em;
    margin-bottom: 6px;
  }
  .lock-sub {
    text-align: center;
    font-size: 12.5px;
    color: #64748b;
    margin-bottom: 36px;
    letter-spacing: 0.02em;
  }

  /* ── Input group ── */
  .input-group { position: relative; margin-bottom: 14px; }
  .input-group label {
    display: block;
    font-size: 10.5px;
    font-weight: 700;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #64748b;
    margin-bottom: 8px;
  }
  .input-group input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(59,130,246,0.22);
    border-radius: 10px;
    padding: 13px 46px 13px 16px;
    font-size: 15px;
    color: #e2e8f0;
    outline: none;
    letter-spacing: 0.06em;
    transition: border-color .2s, box-shadow .2s, background .2s;
    font-family: 'Courier New', monospace;
  }
  .input-group input::placeholder { color: #334155; letter-spacing: 0.04em; }
  .input-group input:focus {
    border-color: rgba(59,130,246,0.6);
    background: rgba(59,130,246,0.06);
    box-shadow: 0 0 0 3px rgba(59,130,246,0.12);
  }
  .input-group input.error {
    border-color: rgba(244,63,94,0.6);
    background: rgba(244,63,94,0.05);
    box-shadow: 0 0 0 3px rgba(244,63,94,0.1);
    animation: shake 0.4s ease;
  }
  @keyframes shake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-6px)}
    40%{transform:translateX(6px)} 60%{transform:translateX(-4px)} 80%{transform:translateX(4px)}
  }

  /* Eye toggle */
  .eye-btn {
    position: absolute;
    right: 13px; bottom: 13px;
    background: none; border: none;
    cursor: pointer; padding: 2px;
    color: #4a5568;
    font-size: 18px;
    transition: color .2s;
    line-height: 1;
  }
  .eye-btn:hover { color: #93c5fd; }

  /* ── Unlock button ── */
  .unlock-btn {
    width: 100%;
    margin-top: 8px;
    padding: 14px;
    background: linear-gradient(135deg, #2563eb, #1d4ed8);
    border: none;
    border-radius: 10px;
    color: #fff;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all .2s;
    box-shadow: 0 4px 16px rgba(37,99,235,0.35);
    display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .unlock-btn:hover { background: linear-gradient(135deg, #3b82f6, #2563eb); transform: translateY(-1px); box-shadow: 0 6px 20px rgba(37,99,235,0.45); }
  .unlock-btn:active { transform: translateY(0); }
  .unlock-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* ── Progress bar (shown during PBKDF2) ── */
  .progress-wrap {
    display: none;
    margin-top: 16px;
  }
  .progress-track {
    background: rgba(255,255,255,0.06);
    border-radius: 4px;
    height: 4px;
    overflow: hidden;
    margin-bottom: 8px;
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, #2563eb, #06d6a0);
    border-radius: 4px;
    width: 0%;
    transition: width 0.3s ease;
  }
  .progress-label {
    font-size: 11px;
    color: #64748b;
    text-align: center;
    letter-spacing: 0.04em;
  }

  /* ── Error / Status message ── */
  .msg {
    display: none;
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12.5px;
    text-align: center;
    font-weight: 500;
  }
  .msg.error { background: rgba(244,63,94,0.12); border: 1px solid rgba(244,63,94,0.3); color: #fb7185; }
  .msg.success { background: rgba(6,214,160,0.1); border: 1px solid rgba(6,214,160,0.3); color: #34d399; }

  /* ── Attempt counter ── */
  .attempt-info {
    text-align: center;
    font-size: 11px;
    color: #374151;
    margin-top: 18px;
    letter-spacing: 0.03em;
  }
  .attempt-info span { color: #f59e0b; }

  /* ── Security badges ── */
  .sec-badges {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-top: 24px;
    flex-wrap: wrap;
  }
  .sec-badge {
    font-size: 9.5px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: #374151;
    border: 1px solid #1e2d3d;
    border-radius: 4px;
    padding: 3px 8px;
    white-space: nowrap;
  }

  /* ── Lockout overlay ── */
  #lockout-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(8,12,20,0.96);
    z-index: 999;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
  }
  #lockout-overlay.active { display: flex; }
  #lockout-msg {
    font-size: 15px;
    color: #fb7185;
    font-weight: 600;
    text-align: center;
  }
  #lockout-timer {
    font-size: 36px;
    font-weight: 700;
    color: #f59e0b;
    font-variant-numeric: tabular-nums;
    font-family: 'Courier New', monospace;
  }
  #lockout-sub { font-size: 12px; color: #64748b; }

  /* ── App container (hidden until unlocked) ── */
  #app-container {
    display: none;
    position: fixed;
    inset: 0;
    overflow: auto;
    background: #0f1117;
  }
</style>
</head>

// ── Security constants ──────────────────────────────────
const MAX_ATTEMPTS    = 5;
const LOCKOUT_SECONDS = 300;   // 5-minute lockout after exhausting attempts
const PBKDF2_ITERS    = 310000;
const KEY_BITS        = 256;

// ── State ───────────────────────────────────────────────
let attemptsLeft   = MAX_ATTEMPTS;
let isLocked       = false;
let lockoutEnd     = null;

// ── Eye toggle ──────────────────────────────────────────
document.getElementById('eye-btn').addEventListener('click', () => {
  const inp = document.getElementById('pw-input');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

// ── Enter key ───────────────────────────────────────────
document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') attemptUnlock();
});

// ── Show message ─────────────────────────────────────────
function showMsg(text, type) {
  const box = document.getElementById('msg-box');
  box.textContent = text;
  box.className   = 'msg ' + type;
  box.style.display = 'block';
}
function hideMsg() {
  document.getElementById('msg-box').style.display = 'none';
}

// ── Lockout timer ────────────────────────────────────────
function startLockout() {
  isLocked  = true;
  lockoutEnd = Date.now() + LOCKOUT_SECONDS * 1000;
  const ov   = document.getElementById('lockout-overlay');
  ov.classList.add('active');
  const tick = setInterval(() => {
    const rem = Math.max(0, Math.ceil((lockoutEnd - Date.now()) / 1000));
    const m   = String(Math.floor(rem / 60)).padStart(2, '0');
    const s   = String(rem % 60).padStart(2, '0');
    document.getElementById('lockout-timer').textContent = m + ':' + s;
    if (rem <= 0) {
      clearInterval(tick);
      isLocked      = false;
      attemptsLeft  = MAX_ATTEMPTS;
      document.getElementById('attempts-left').textContent = attemptsLeft;
      ov.classList.remove('active');
      hideMsg();
      document.getElementById('pw-input').value = '';
      document.getElementById('pw-input').focus();
    }
  }, 250);
}

// ── Base64 → Uint8Array ──────────────────────────────────
function b64ToBytes(b64) {
  const bin = atob(b64);
  const arr = new Uint8Array(bin.length);
  for (let i = 0; i < bin.length; i++) arr[i] = bin.charCodeAt(i);
  return arr;
}

// ── Bytes → hex ──────────────────────────────────────────
function toHex(arr) {
  return Array.from(arr).map(b => b.toString(16).padStart(2,'0')).join('');
}

// ── Constant-time byte comparison (prevents timing attacks) ──
function safeEqual(a, b) {
  if (a.length !== b.length) return false;
  let diff = 0;
  for (let i = 0; i < a.length; i++) diff |= a[i] ^ b[i];
  return diff === 0;
}

// ── Main decrypt attempt ─────────────────────────────────
async function attemptUnlock() {
  if (isLocked) return;

  const pw = document.getElementById('pw-input').value;
  if (!pw) { showMsg('Please enter the password.', 'error'); return; }

  // Disable UI
  const btn  = document.getElementById('unlock-btn');
  const inp  = document.getElementById('pw-input');
  btn.disabled = true;
  inp.disabled = true;
  inp.classList.remove('error');
  hideMsg();

  // Show progress
  const pwrap = document.getElementById('progress-wrap');
  const pbar  = document.getElementById('progress-bar');
  const plbl  = document.getElementById('progress-label');
  pwrap.style.display = 'block';
  pbar.style.width = '0%';
  plbl.textContent = 'Deriving key (PBKDF2-SHA256 · 310,000 iterations)…';

  // Animate progress during PBKDF2 (yield to browser between chunks)
  await new Promise(r => setTimeout(r, 20));
  pbar.style.width = '15%';
  await new Promise(r => setTimeout(r, 30));

  try {
    // ── Parse payload ──────────────────────────────────
    const payload  = b64ToBytes(ENCRYPTED_B64);
    const salt     = payload.slice(0, 32);    // 32 bytes
    const iv       = payload.slice(32, 48);   // 16 bytes
    const mac      = payload.slice(48, 80);   // 32 bytes
    const cipher   = payload.slice(80);       // rest = ciphertext

    // ── PBKDF2-SHA256 via WebCrypto ───────────────────
    pbar.style.width = '30%';
    const pwKey = await crypto.subtle.importKey(
      'raw', new TextEncoder().encode(pw), 'PBKDF2', false, ['deriveBits']
    );
    pbar.style.width = '45%';
    await new Promise(r => setTimeout(r, 10));

    const derived = await crypto.subtle.deriveBits(
      { name:'PBKDF2', salt, iterations: PBKDF2_ITERS, hash:'SHA-256' },
      pwKey, 512   // 512 bits = 64 bytes (enc key 32 + hmac key 32)
    );
    pbar.style.width = '75%';
    await new Promise(r => setTimeout(r, 10));
    plbl.textContent = 'Verifying integrity (HMAC-SHA256)…';

    const derivedArr = new Uint8Array(derived);
    const encKey     = derivedArr.slice(0, 32);
    const hmacKey    = derivedArr.slice(32);

    // ── HMAC-SHA256 verification ──────────────────────
    const hmacKeyObj = await crypto.subtle.importKey(
      'raw', hmacKey, { name:'HMAC', hash:'SHA-256' }, false, ['sign']
    );
    const macData = new Uint8Array(salt.length + iv.length + cipher.length);
    macData.set(salt, 0);
    macData.set(iv,   salt.length);
    macData.set(cipher, salt.length + iv.length);

    const computedMac = new Uint8Array(
      await crypto.subtle.sign('HMAC', hmacKeyObj, macData)
    );
    pbar.style.width = '85%';

    if (!safeEqual(computedMac, mac)) {
      throw new Error('HMAC_FAIL');  // wrong password → MAC mismatch
    }

    // ── AES-256-CBC decrypt ───────────────────────────
    plbl.textContent = 'Decrypting…';
    const aesKey = await crypto.subtle.importKey(
      'raw', encKey, { name:'AES-CBC' }, false, ['decrypt']
    );
    const plainBuf = await crypto.subtle.decrypt(
      { name:'AES-CBC', iv }, aesKey, cipher
    );
    pbar.style.width = '100%';

    // ── Success: render the decrypted HTML ───────────
    await new Promise(r => setTimeout(r, 150));
    plbl.textContent = '✓ Authenticated!';

    const html = new TextDecoder('utf-8').decode(plainBuf);

    // Replace the entire page with the decrypted app
    document.getElementById('lock-screen').style.display = 'none';
    const appDiv = document.getElementById('app-container');
    appDiv.style.display = 'block';

    // Write into a same-origin srcdoc iframe so scripts execute
    const iframe = document.createElement('iframe');
    iframe.style.cssText = 'width:100%;height:100%;border:none;display:block;';
    iframe.srcdoc = html;
    iframe.sandbox = 'allow-scripts allow-same-origin allow-modals allow-downloads allow-forms';
    appDiv.appendChild(iframe);

  } catch (err) {
    // ── Wrong password or tampered file ──────────────
    pbar.style.width = '0%';
    pwrap.style.display = 'none';

    attemptsLeft--;
    document.getElementById('attempts-left').textContent = attemptsLeft;

    if (attemptsLeft <= 0) {
      startLockout();
    } else {
      const isCorrupt = err.message !== 'HMAC_FAIL' && !String(err).includes('OperationError');
      if (isCorrupt) {
        showMsg('⚠ File integrity check failed. File may be corrupted.', 'error');
      } else {
        showMsg('✗ Incorrect password. ' + attemptsLeft + ' attempt' + (attemptsLeft === 1 ? '' : 's') + ' remaining.', 'error');
      }
      inp.classList.add('error');
      inp.value = '';
    }

    btn.disabled  = false;
    inp.disabled  = false;
    inp.focus();
  }
}
</script>
